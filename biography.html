<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Biography - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <div class="header-right">
        <nav><ul class="nav-links">
            <li><a href="index.html#news">News</a></li>
            <li><a href="index.html#biography">Biography</a></li>
            <li><a href="index.html#discography">Discography</a></li>
        </ul></nav>
    </div>
</header>

<div class="section">
    <div class="bio-container" id="bio-content">
        <div class="bio-photo"><img id="m-image" src="" alt=""></div>
        <div class="bio-info">
            <h2 id="m-name"></h2>
            <ul class="bio-list">
                <li><span class="bio-label">Birthday</span><span class="bio-value" id="m-birthday"></span></li>
                <li><span class="bio-label">Position</span><span class="bio-value" id="m-position"></span></li>
            </ul>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script>
    // URLからどのメンバーかを取得 (?id=1chika など)
    const params = new URLSearchParams(window.location.search);
    const memberId = params.get('id');
    const data = memberData[memberId];

    if (data) {
        document.getElementById('m-name').innerText = data.name;
        document.getElementById('m-birthday').innerText = data.birthday;
        document.getElementById('m-position').innerText = data.position;
        document.getElementById('m-image').src = data.image;
        document.title = `${data.name} - Kiss-U Biography`;
    }
</script>
</body>
</html>
