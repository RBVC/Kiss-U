<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Kiss-U Japan Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤎</text></svg>">
    <link rel="stylesheet" href="style.css?v=fresh_ani">
</head>
<body id="top">
    <div id="loading"><div class="loading-logo">Kiss-U</div></div>
    <div id="common-header"></div>
    <div class="hero fade-in"></div>

    <section id="news" class="section fade-in">
        <h2 class="section-title">News</h2>
        <div id="top-news-container"></div>
        <div style="text-align: center;"><a href="news.html" class="view-more-btn">View More</a></div>
    </section>

    <section id="profile" class="section fade-in">
        <h2 class="section-title">Profile</h2>
        <div class="grid-nav nav-5col">
            <!-- 1chika -->
            <a href="profile.html?id=1chika" class="grid-item">
                <div class="photo-box"><img src="./images/1chika.png"></div>
                <span>1chika</span>
            </a>
            <!-- 3tuba -->
            <a href="profile.html?id=3tuba" class="grid-item">
                <div class="photo-box"><img src="./images/3tuba.png"></div>
                <span>3tuba</span>
            </a>
            <!-- 5ma -->
            <a href="profile.html?id=5ma" class="grid-item">
                <div class="photo-box"><img src="./images/5ma.png"></div>
                <span>5ma</span>
            </a>
            <!-- na7o -->
            <a href="profile.html?id=na7o" class="grid-item">
                <div class="photo-box"><img src="./images/na7o.png"></div>
                <span>na7o</span>
            </a>
            <!-- ku9 -->
            <a href="profile.html?id=ku9" class="grid-item">
                <div class="photo-box"><img src="./images/ku9.png"></div>
                <span>ku9</span>
            </a>
        </div>
    </section>

    <section id="discography" class="section fade-in">
        <h2 class="section-title">Discography</h2>
        <div class="grid-nav nav-4col">
            <a href="discography.html?id=come-over" class="grid-item"><div class="photo-box square"><img src="https://ih1.redbubble.net/image.5809651142.3212/fposter,small,wall_texture,square_product,600x600.jpg"></div><span>Come Over</span></a>
            <a href="discography.html?id=awe" class="grid-item"><div class="photo-box square"><img src="https://img.imageimg.net/artist/xg/img/product_1037894.png"></div><span>AWE</span></a>
            <a href="discography.html?id=the-aend" class="grid-item"><div class="photo-box square"><img src="https://images.genius.com/b47591b4de032d8e9ffaecba356b43db.1000x1000x1.png"></div><span>the a(e)nd</span></a>
            <a href="discography.html?id=fly-by" class="grid-item"><div class="photo-box square"><img src="https://images.genius.com/a16644bd336d84437e195572f9ae309f.1000x1000x1.png"></div><span>FLY-BY</span></a>
        </div>
    </section>

    <div id="common-footer"></div>
    <script src="data.js"></script><script src="common.js"></script>
    <script>if(newsData.length>0){const top=newsData[0];document.getElementById('top-news-container').innerHTML=`<a href="${top.link}" class="news-item"><span class="news-date">${top.date}</span><span class="news-text">${top.text}</span></a>`;}</script>
</body>
</html>
