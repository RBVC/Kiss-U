<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Kiss-U Japan Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- フォント設定 --- */
        @font-face {
            font-family: 'Aprila';
            src: url('./fonts/Aprila-Bold.otf') format('opentype');
            font-weight: bold;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background-color: #1b1111; /* ダークチョコレート */
            color: #d8c8c8;
            font-family: 'Shippori Mincho', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ヘッダー */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            box-sizing: border-box;
            background: rgba(27, 17, 17, 0.85);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { 
            font-family: 'Aprila'; 
            font-size: 1.8rem; 
            text-decoration: none; 
            color: #fff; 
            letter-spacing: 2px;
        }
        .heart { color: #d0454f; font-size: 0.9em; margin: 0 2px; }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            font-family: 'Aprila';
            transition: 0.3s;
        }
        nav a:hover { color: #d0454f; }

        /* メインビジュアル */
        .hero {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2a1a1a 0%, #1b1111 100%);
        }
        .hero h1 { 
            font-size: clamp(4rem, 15vw, 9rem); 
            font-family: 'Aprila'; 
            margin: 0; 
            color: #fff;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }
        .hero p {
            font-family: 'Aprila';
            font-size: 1.2rem;
            margin-top: 10px;
            letter-spacing: 0.5em;
            color: #7a6a6a;
        }

        /* セクション共通 */
        .section { padding: 120px 50px; max-width: 1100px; margin: 0 auto; }
        .section-title {
            font-family: 'Aprila';
            font-size: 2.8rem;
            border-bottom: 1px solid #3a2a2a;
            padding-bottom: 20px;
            margin-bottom: 60px;
            color: #fff;
        }

        /* News */
        .news-item {
            display: flex;
            padding: 25px 0;
            border-bottom: 1px solid #2a1a1a;
            text-decoration: none;
            color: #b8a8a8;
            transition: 0.3s;
        }
        .news-item:hover { color: #fff; padding-left: 10px; }
        .news-date { font-family: 'Aprila'; width: 140px; color: #7a6a6a; }

        /* Biography (奇数コンセプト反映) */
        .member-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
        }
        .member-thumb {
            text-decoration: none;
            color: #fff;
            text-align: center;
        }
        .photo-box { 
            width: 100%;
            aspect-ratio: 3/4; 
            background: #2a1a1a; 
            margin-bottom: 15px; 
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid #3a2a2a;
            overflow: hidden;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画像の比率を保って収める */
            filter: grayscale(0.3) contrast(1.1);
            transition: 0.5s;
        }
        .member-thumb:hover .photo-box { 
            transform: translateY(-10px); 
            border-color: #d0454f;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
        }
        .member-thumb:hover img {
            filter: grayscale(0) contrast(1.2);
            transform: scale(1.05);
        }
        .member-thumb span { 
            display: block; 
            font-family: 'Aprila'; 
            font-size: 1.2rem; 
            letter-spacing: 2px;
        }

        footer { 
            text-align: center; 
            padding: 100px 0 60px; 
            font-size: 0.7rem; 
            color: #5a4a4a; 
            font-family: 'Aprila';
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            .section { padding: 80px 20px; }
            nav a { margin-left: 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body id="top">

<header>
    <a href="#top" class="logo">Kiss<span class="heart">❤︎</span>U</a>
    <nav>
        <a href="#news">News</a>
        <a href="#biography">Biography</a>
        <a href="#discography">Discography</a>
    </nav>
</header>

<div class="hero">
    <h1>Kiss<span class="heart">❤︎</span>U</h1>
    <p>Kisuu / Project-U</p>
</div>

<!-- News Section -->
<section id="news" class="section">
    <h2 class="section-title">News</h2>
    <div class="news-list">
        <a href="#" class="news-item">
            <span class="news-date">2026.06.08</span>
            <span class="news-text">Kiss❤︎U Official Site Open</span>
        </a>
        <a href="#" class="news-item">
            <span class="news-date">2026.07.01</span>
            <span class="news-text">Debut Single "Phantom Flower" Release</span>
        </a>
    </div>
</section>

<!-- Biography Section -->
<section id="biography" class="section">
    <h2 class="section-title">Biography</h2>
    <div class="member-nav">
        <!-- 1chika -->
        <a href="#profile-1chika" class="member-thumb">
            <div class="photo-box">
                <img src="./images/1chika.png" alt="1chika">
            </div>
            <span>1chika</span>
        </a>
        <!-- 3tuba -->
        <a href="#profile-3tuba" class="member-thumb">
            <div class="photo-box">
                <img src="./images/3tuba.png" alt="3tuba">
            </div>
            <span>3tuba</span>
        </a>
        <!-- 5ma -->
        <a href="#profile-5ma" class="member-thumb">
            <div class="photo-box">
                <img src="./images/5ma.png" alt="5ma">
            </div>
            <span>5ma</span>
        </a>
        <!-- na7o -->
        <a href="#profile-na7o" class="member-thumb">
            <div class="photo-box">
                <img src="./images/na7o.png" alt="na7o">
            </div>
            <span>na7o</span>
        </a>
        <!-- ku9 -->
        <a href="#profile-ku9" class="member-thumb">
            <div class="photo-box">
                <img src="./images/ku9.png" alt="ku9">
            </div>
            <span>ku9</span>
        </a>
    </div>
</section>

<!-- Discography Section -->
<section id="discography" class="section">
    <h2 class="section-title">Discography</h2>
    <div style="opacity: 0.4; font-family: 'Aprila'; letter-spacing: 2px;">
        Coming soon...
    </div>
</section>

<footer>
    &copy; Kiss❤︎U / Project-U ANYCOLOR Inc. (Fictional)
</footer>

</body>
</html>
