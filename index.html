<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Kiss-U Japan Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Aprila';
            src: url('./fonts/Aprila-Bold.otf') format('opentype');
            font-weight: bold;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background-color: #2b1a1a; /* チョコ感を強めた濃い茶色 */
            color: #d8c8c8;
            font-family: 'Shippori Mincho', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* ヘッダー */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            box-sizing: border-box;
            background: rgba(43, 26, 26, 0.9); /* 背景色に合わせる */
            z-index: 1000;
        }

        .logo { 
            font-family: 'Aprila'; 
            font-size: 1.6rem; 
            text-decoration: none; 
            color: #fff; 
            letter-spacing: 2px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            font-family: 'Aprila';
            transition: 0.3s;
        }
        nav a:hover { opacity: 0.5; }

        /* メインビジュアル (Hero Section) */
        .hero {
            width: 100%;
            height: 100vh;
            position: relative;
            background-color: #d6d6d6; /* main.jpgの背景色（グレー）に合わせる */
            background-image: url('./images/main.jpg');
            background-size: contain; /* ロゴが切れないように全体を表示 */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 画像の下をチョコ色にじわっと溶け込ませるグラデーション */
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 30%;
            background: linear-gradient(to bottom, transparent, #2b1a1a);
        }

        /* セクション共通 */
        .section { padding: 100px 50px; max-width: 1100px; margin: 0 auto; }
        .section-title {
            font-family: 'Aprila';
            font-size: 2.8rem;
            border-bottom: 1px solid #4a3a3a;
            padding-bottom: 20px;
            margin-bottom: 60px;
            color: #fff;
        }

        /* News */
        .news-item {
            display: flex;
            padding: 25px 0;
            border-bottom: 1px solid #3a2a2a;
            text-decoration: none;
            color: #b8a8a8;
            transition: 0.3s;
        }
        .news-item:hover { color: #fff; padding-left: 10px; }
        .news-date { font-family: 'Aprila'; width: 140px; color: #8a6a6a; }

        /* Biography */
        .member-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px;
        }
        .member-thumb {
            text-decoration: none;
            color: #fff;
            text-align: center;
        }
        .photo-box { 
            width: 100%;
            aspect-ratio: 3/4; 
            background: #3a2a2a; 
            margin-bottom: 15px; 
            transition: 0.5s;
            border: 1px solid #4a3a3a;
            overflow: hidden;
        }
        .photo-box img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(0.2); transition: 0.5s;
        }
        .member-thumb:hover .photo-box { transform: translateY(-10px); border-color: #8a6a6a; }
        .member-thumb span { display: block; font-family: 'Aprila'; font-size: 1.2rem; letter-spacing: 2px; }

        footer { 
            text-align: center; 
            padding: 80px 0; 
            font-size: 0.7rem; 
            color: #6a5a5a; 
            font-family: 'Aprila';
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; }
            nav a { margin-left: 15px; font-size: 0.8rem; }
            .hero { height: 60vh; } /* スマホでは少し高さを抑える */
        }
    </style>
</head>
<body id="top">

<header>
    <a href="#top" class="logo">Kiss-U</a>
    <nav>
        <a href="#news">News</a>
        <a href="#biography">Biography</a>
        <a href="#discography">Discography</a>
    </nav>
</header>

<!-- 文字を消して画像だけのHeroセクション -->
<div class="hero"></div>

<section id="news" class="section">
    <h2 class="section-title">News</h2>
    <div class="news-list">
        <a href="#" class="news-item">
            <span class="news-date">2026.06.08</span>
            <span class="news-text">Kiss-U Official Site Open</span>
        </a>
        <a href="#" class="news-item">
            <span class="news-date">2026.07.01</span>
            <span class="news-text">Debut Single "Phantom Flower" Release</span>
        </a>
    </div>
</section>

<section id="biography" class="section">
    <h2 class="section-title">Biography</h2>
    <div class="member-nav">
        <a href="#profile-1chika" class="member-thumb">
            <div class="photo-box"><img src="./images/1chika.png" alt="1chika"></div>
            <span>1chika</span>
        </a>
        <a href="#profile-3tuba" class="member-thumb">
            <div class="photo-box"><img src="./images/3tuba.png" alt="3tuba"></div>
            <span>3tuba</span>
        </a>
        <a href="#profile-5ma" class="member-thumb">
            <div class="photo-box"><img src="./images/5ma.png" alt="5ma"></div>
            <span>5ma</span>
        </a>
        <a href="#profile-na7o" class="member-thumb">
            <div class="photo-box"><img src="./images/na7o.png" alt="na7o"></div>
            <span>na7o</span>
        </a>
        <a href="#profile-ku9" class="member-thumb">
            <div class="photo-box"><img src="./images/ku9.png" alt="ku9"></div>
            <span>ku9</span>
        </a>
    </div>
</section>

<section id="discography" class="section">
    <h2 class="section-title">Discography</h2>
    <div style="opacity: 0.4; font-family: 'Aprila'; letter-spacing: 2px;">
        Coming soon...
    </div>
</section>

<footer>
    &copy; Kiss-U / Project-U ANYCOLOR Inc. (Fictional)
</footer>

</body>
</html>
