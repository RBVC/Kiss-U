<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Kiss-U Japan Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- フォント設定 --- */
        @font-face {
            font-family: 'Aprila';
            src: url('./fonts/Aprila-Bold.otf') format('opentype');
            font-weight: bold;
        }

        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Shippori Mincho', serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 共通：頭文字だけ大文字のスタイル */
        .title-case {
            font-family: 'Aprila', sans-serif;
            text-transform: none; /* そのまま表示（HTML側で頭文字だけ大文字にする） */
            letter-spacing: 0.05em;
        }

        /* ヘッダー */
        header {
            position: fixed;
            top: 0; width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            box-sizing: border-box;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .logo { font-family: 'Aprila'; font-size: 1.5rem; text-decoration: none; color: #fff; }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            font-family: 'Aprila';
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 0.6; }

        /* メインビジュアル（KIOF風スライダー想定） */
        .hero {
            width: 100%;
            height: 100vh;
            background: #111; /* 本来はここにメイン画像が入る */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .hero h1 { font-size: 8vw; font-family: 'Aprila'; margin: 0; }

        /* セクション共通 */
        .section { padding: 80px 50px; max-width: 1200px; margin: 0 auto; }
        .section-title {
            font-family: 'Aprila';
            font-size: 2.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        /* ニュースリスト */
        .news-item {
            display: flex;
            padding: 20px 0;
            border-bottom: 1px solid #222;
            text-decoration: none;
            color: #ccc;
            transition: color 0.3s;
        }
        .news-item:hover { color: #fff; }
        .news-date { font-family: 'Aprila'; width: 150px; color: #666; }

        /* ボタン */
        .btn-more {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 40px;
            border: 1px solid #fff;
            color: #fff;
            text-decoration: none;
            font-family: 'Aprila';
            font-size: 0.8rem;
            transition: 0.3s;
        }
        .btn-more:hover { background: #fff; color: #000; }

        /* プロフィール（サムネイル並列） */
        .member-nav {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .member-thumb {
            text-decoration: none;
            color: #fff;
            text-align: center;
        }
        .member-thumb img { width: 100%; filter: grayscale(1); transition: 0.5s; }
        .member-thumb:hover img { filter: grayscale(0); transform: scale(1.05); }
        .member-thumb span { display: block; margin-top: 15px; font-family: 'Aprila'; }

        footer { text-align: center; padding: 100px 0 50px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <nav>
        <a href="news.html">News</a>
        <a href="biography.html">Biography</a>
        <a href="discography.html">Discography</a>
        <a href="#sns">Sns</a>
    </nav>
</header>

<div class="hero">
    <h1>Kiss-U</h1>
</div>

<section class="section">
    <h2 class="section-title">News</h2>
    <a href="#" class="news-item">
        <span class="news-date">2026.06.08</span>
        <span class="news-text">Kiss-U Official Site Open</span>
    </a>
    <a href="#" class="news-item">
        <span class="news-date">2026.07.01</span>
        <span class="news-text">Debut Single "Phantom Flower" Release</span>
    </a>
    <a href="news.html" class="btn-more">View More</a>
</section>

<section class="section">
    <h2 class="section-title">Biography</h2>
    <div class="member-nav">
        <!-- 各メンバーへのリンク -->
        <a href="biography.html#ichika" class="member-thumb">
            <div style="aspect-ratio: 3/4; background: #222;"></div> <!-- ここに画像を入れる -->
            <span>Ichika Hibiscus</span>
        </a>
        <a href="biography.html#mitsuha" class="member-thumb">
            <div style="aspect-ratio: 3/4; background: #222;"></div>
            <span>Mitsuha Trifolium</span>
        </a>
        <a href="biography.html#goma" class="member-thumb">
            <div style="aspect-ratio: 3/4; background: #222;"></div>
            <span>Goma Freesia</span>
        </a>
        <a href="biography.html#nanao" class="member-thumb">
            <div style="aspect-ratio: 3/4; background: #222;"></div>
            <span>Nanao Pixy-delight</span>
        </a>
        <a href="biography.html#kuku" class="member-thumb">
            <div style="aspect-ratio: 3/4; background: #222;"></div>
            <span>Kuku Blossom</span>
        </a>
    </div>
</section>

<footer id="sns">
    <p>Follow Us</p>
    <!-- SNSアイコンなど -->
    <p>&copy; Kiss-U / Project-U ANYCOLOR Inc.</p>
</footer>

</body>
</html>
