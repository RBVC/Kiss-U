<!DOCTYPE html>

    <link rel="stylesheet" href="style.css?v=fresh_all">
</head>
<body>
<header>

    <nav><ul class="nav-links">
        <li><a href="news.html">News</a></li>

<div class="section">

</div>
<footer><div class="copyright">Copyright &copy; Kiss-U JAPAN. All Rights Reserved.</div></footer>
<script src="data.js"></script>
<script>
    const fullNewsList = document.getElementById('full-news-list');
    newsData.forEach(item => {
        const a = document.createElement('a'); a.href = item.link;
        a.style = "display:flex; align-items:center; padding:25px 10px; border-bottom:1px solid #3a2a2a; text-decoration:none; color:#d8c8c8;";
        a.innerHTML = `<span style="font-family:'Aprila'; width:140px; color:#8a6a6a; flex-shrink:0;">${item.date}</span><span>${item.text}</span>`;
        fullNewsList.appendChild(a);
    });
</script>
</body>
</html>
