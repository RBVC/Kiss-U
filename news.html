<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>News - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=fresh_system">
</head>
<body>
<div id="common-header"></div>
<div class="section">
    <h2 class="section-title">News</h2>
    <div id="full-news-list"></div>
</div>
<div id="common-footer"></div>
<script src="data.js"></script>
<script src="common.js"></script>
<script>
    const fullNewsList = document.getElementById('full-news-list');
    newsData.forEach(item => {
        const a = document.createElement('a'); a.href = item.link;
        a.className = 'news-item';
        a.innerHTML = `<span class="news-date">${item.date}</span><span>${item.text}</span>`;
        fullNewsList.appendChild(a);
    });
</script>
</body>
</html>
