<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Kiss-U Japan Official Site</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google Fonts（Noto）のリンクを消し、これだけにする -->
    <link rel="stylesheet" href="style.css?v=fresh_gothic">
    <!-- アイコン素材（Discography.htmlのみ必要） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div id="common-header"></div>
<div class="section">
    <h2 class="section-title">News</h2>
    <div id="full-news-list"></div>
</div>
<div id="common-footer"></div>
<script src="data.js"></script>
<script src="common.js"></script>
<script>
    const fullNewsList = document.getElementById('full-news-list');
    newsData.forEach(item => {
        const a = document.createElement('a'); a.href = item.link;
        a.className = 'news-item';
        a.innerHTML = `<span class="news-date">${item.date}</span><span>${item.text}</span>`;
        fullNewsList.appendChild(a);
    });
</script>
</body>
</html>
