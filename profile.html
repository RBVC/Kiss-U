<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Profile - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- フォント読み込み -->
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <!-- デザインファイル読み込み -->
    <link rel="stylesheet" href="style.css?v=final_update">
</head>
<body>

<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <nav>
        <ul class="nav-links">
            <li><a href="news.html">News</a></li>
            <li><a href="profile.html?id=1chika">Profile</a></li>
            <li><a href="index.html#discography">Discography</a></li>
        </ul>
    </nav>
</header>

<div class="section">
    <!-- 他のページと高さを合わせた大見出し -->
    <h2 class="section-title">Profile</h2>

    <div class="detail-flex fade-in">
        <!-- 左側：メンバー立ち絵 -->
        <div class="detail-left">
            <img id="m-image" src="" alt="Member Photo">
        </div>

        <!-- 右側：詳細情報 -->
        <div class="detail-right profile-info">
            <h2 id="m-codename"></h2> <!-- コードネーム -->
            
            <ul class="profile-table">
                <li>
                    <span class="label">Name</span>
                    <span class="value" id="m-name"></span>
                </li>
                <li>
                    <span class="label">Birthday</span>
                    <span class="value" id="m-birthday"></span>
                </li>
                <li>
                    <span class="label">Position</span>
                    <span class="value" id="m-position"></span>
                </li>
            </ul>
        </div>
    </div>

    <!-- ILLIT風クイックナビ（5人並び） -->
    <div class="grid-nav quick-nav" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid #3a2a2a;">
        <a href="profile.html?id=1chika" class="grid-item">
            <div class="photo-box square"><img src="./images/1chika.png"></div>
            <span>1chika</span>
        </a>
        <a href="profile.html?id=3tuba" class="grid-item">
            <div class="photo-box square"><img src="./images/3tuba.png"></div>
            <span>3tuba</span>
        </a>
        <a href="profile.html?id=5ma" class="grid-item">
            <div class="photo-box square"><img src="./images/5ma.png"></div>
            <span>5ma</span>
        </a>
        <a href="profile.html?id=na7o" class="grid-item">
            <div class="photo-box square"><img src="./images/na7o.png"></div>
            <span>na7o</span>
        </a>
        <a href="profile.html?id=ku9" class="grid-item">
            <div class="photo-box square"><img src="./images/ku9.png"></div>
            <span>ku9</span>
        </a>
    </div>
</div>

<footer>
    <div class="copyright">
        Copyright &copy; Kiss-U JAPAN. All Rights Reserved.
    </div>
</footer>

<!-- データを読み込んで反映させるスクリプト -->
<script src="data.js"></script>
<script>
    // URLの ?id=... を読み取る
    const params = new URLSearchParams(window.location.search);
    const memberId = params.get('id') || '1chika'; // 指定がない場合は1chikaを表示
    const data = memberData[memberId];

    if (data) {
        // 各要素にデータを流し込む
        document.getElementById('m-codename').innerText = data.codename;
        document.getElementById('m-name').innerText = data.name;
        document.getElementById('m-birthday').innerText = data.birthday;
        document.getElementById('m-position').innerText = data.position;
        document.getElementById('m-image').src = data.image;
        
        // ブラウザのタブ名もメンバー名にする
        document.title = `${data.codename} - Profile | Kiss-U`;
    }
</script>

</body>
</html>
