<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Discography - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <!-- ?v=...をつけてCSSの更新を強制する -->
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <nav><ul class="nav-links">
        <li><a href="index.html#news">News</a></li>
        <li><a href="index.html#profile">Profile</a></li>
        <li><a href="index.html#discography">Discography</a></li>
    </ul></nav>
</header>

<div class="section">
    <h2 class="section-title">Discography</h2>
    
    <div class="disco-flex-row">
        <!-- 左側：ジャケ写 -->
        <div class="disco-jacket-side">
            <img id="p-jacket" src="" alt="Jacket">
        </div>

        <!-- 右側：プレーヤー本体 -->
        <div class="disco-player-side">
            <div class="player-container">
                <div class="p-meta">
                    <h2 id="p-title">Select Track</h2>
                    <p id="p-album">Album Name</p>
                </div>

                <div class="seek-area">
                    <div class="time-box">
                        <span id="curr-time">0:00</span>
                        <span id="dur-time">0:00</span>
                    </div>
                    <input type="range" id="seek-bar" value="0">
                </div>

                <div class="control-btns">
                    <div class="c-btn" id="prev-btn">⏮</div>
                    <div class="c-btn play-main" id="play-btn">▶</div>
                    <div class="c-btn" id="next-btn">⏭</div>
                </div>
            </div>

            <!-- 下：リスト -->
            <div class="track-list-box" id="track-list">
                <!-- JS生成 -->
            </div>
        </div>
    </div>
    
    <audio id="audio-engine"></audio>
</div>

<footer><div class="copyright">Copyright &copy; Kiss-U JAPAN. All Rights Reserved.</div></footer>

<script src="data.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const data = discoData[params.get('id') || 'fly-by'];
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    let currentIdx = 0;

    if (data) {
        document.getElementById('p-album').innerText = data.title;
        document.getElementById('p-jacket').src = data.jacket;

        const list = document.getElementById('track-list');
        data.tracks.forEach((track, i) => {
            const item = document.createElement('div');
            item.className = 't-item';
            item.id = `t-${i}`;
            item.innerHTML = `<div class="t-name">${track.num}. ${track.name}</div><div style="font-size:0.7rem; color:#5a4a4a;">≡</div>`;
            item.onclick = () => loadTrack(i, true);
            list.appendChild(item);
        });
        loadTrack(0, false);
    }

    function loadTrack(i, play) {
        currentIdx = i;
        const t = data.tracks[i];
        audio.src = t.file;
        document.getElementById('p-title').innerText = t.name;
        document.querySelectorAll('.t-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${i}`).classList.add('active');
        if (play) { audio.play(); playBtn.innerText = 'II'; }
    }

    playBtn.onclick = () => {
        if (audio.paused) { audio.play(); playBtn.innerText = 'II'; }
        else { audio.pause(); playBtn.innerText = '▶'; }
    };

    document.getElementById('next-btn').onclick = () => loadTrack((currentIdx + 1) % data.tracks.length, true);
    document.getElementById('prev-btn').onclick = () => loadTrack((currentIdx - 1 + data.tracks.length) % data.tracks.length, true);

    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            seekBar.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        }
    };
    seekBar.oninput = () => audio.currentTime = (seekBar.value / 100) * audio.duration;
    function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m + ":" + (sec < 10 ? "0" : "") + sec; }
    audio.onended = () => document.getElementById('next-btn').click();
</script>
</body>
</html>
