<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Discography - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=final_ux">
</head>
<body>
<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <nav><ul class="nav-links">
        <li><a href="index.html#news">News</a></li>
        <li><a href="profile.html?id=1chika">Profile</a></li>
        <li><a href="index.html#discography">Discography</a></li>
    </ul></nav>
</header>

<div class="section">
    <h2 class="section-title">Discography</h2>
    
    <div class="detail-flex">
        <div class="detail-left"><img id="d-jacket" src=""></div>
        <div class="detail-right">
            <div class="player-box">
                <div class="player-top-controls">
                    <div class="p-meta">
                        <h2 id="p-title">Loading...</h2>
                        <p id="p-album"></p>
                    </div>
                    <div class="seek-bar-container" style="margin-top:20px;">
                        <div class="time-info" style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:11px; color:#8a6a6a; font-family:'Aprila';">
                            <span id="curr-time">0:00</span><span id="dur-time">0:00</span>
                        </div>
                        <input type="range" id="seek-bar" value="0">
                    </div>

                    <div class="player-controls-grid">
                        <div class="grid-left">
                            <i class="fa-solid fa-volume-low" id="mute-btn"></i>
                            <input type="range" id="volume-bar" min="0" max="1" step="0.05" value="0.7">
                        </div>
                        <div class="grid-center">
                            <i class="fa-solid fa-backward-step ctrl-icon" id="prev-btn"></i>
                            <i class="fa-solid fa-play ctrl-icon play-btn-main" id="play-btn"></i>
                            <i class="fa-solid fa-forward-step ctrl-icon" id="next-btn"></i>
                        </div>
                        <div class="grid-right">
                            <i class="fa-solid fa-shuffle ctrl-icon" id="shuffle-btn"></i>
                            <i class="fa-solid fa-repeat ctrl-icon" id="repeat-btn"></i>
                        </div>
                    </div>
                </div>
                <div class="player-track-list" id="track-container"></div>
            </div>
        </div>
    </div>

    <!-- クイックナビ（ジャケ写とタイトルのみに簡素化） -->
    <div class="grid-nav" id="disco-quick-nav" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid #3a2a2a;"></div>
</div>

<footer><div class="copyright">Copyright &copy; Kiss-U JAPAN. All Rights Reserved.</div></footer>

<script src="data.js"></script>
<script>
    const discoId = new URLSearchParams(window.location.search).get('id') || 'fly-by';
    const data = discoData[discoId];
    const audio = new Audio();
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const volBar = document.getElementById('volume-bar');
    const muteBtn = document.getElementById('mute-btn');

    let currentIdx = 0;
    let isShuffle = false;
    let repeatMode = 0; // 0:なし, 1:全曲, 2:1曲

    if (data) {
        document.getElementById('p-album').innerText = data.title;
        document.getElementById('d-jacket').src = data.jacket;
        const container = document.getElementById('track-container');
        data.tracks.forEach((t, i) => {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.id = `t-${i}`;
            row.innerHTML = `<span>${t.num}. ${t.name}</span>`;
            row.onclick = () => loadTrack(i, true);
            container.appendChild(row);
        });
        loadTrack(0, false);
    }

    // クイックナビ（アルバムタイトルのみ表示）
    const navContainer = document.getElementById('disco-quick-nav');
    Object.keys(discoData).forEach(key => {
        const item = discoData[key];
        // 1st EPなどの表記を消して引用符の中身だけ（またはそのままタイトル）を表示
        // ここではシンプルにそのままのタイトルを表示するようにします
        const a = document.createElement('a');
        a.href = `discography.html?id=${key}`;
        a.className = 'grid-item';
        a.innerHTML = `<div class="photo-box square"><img src="${item.jacket}"></div><span>${item.title.split('"')[1] || item.title}</span>`;
        navContainer.appendChild(a);
    });

    function loadTrack(i, play) {
        currentIdx = i;
        const t = data.tracks[i];
        audio.src = t.file;
        document.getElementById('p-title').innerText = t.name;
        document.querySelectorAll('.track-row').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${i}`).classList.add('active');
        if (play) { audio.play(); playBtn.className = 'fa-solid fa-pause ctrl-icon play-btn-main'; }
    }

    playBtn.onclick = () => {
        if (audio.paused) { audio.play(); playBtn.className = 'fa-solid fa-pause ctrl-icon play-btn-main'; }
        else { audio.pause(); playBtn.className = 'fa-solid fa-play ctrl-icon play-btn-main'; }
    };

    shuffleBtn.onclick = () => { isShuffle = !isShuffle; shuffleBtn.classList.toggle('active', isShuffle); };
    
    repeatBtn.onclick = () => {
        repeatMode = (repeatMode + 1) % 3;
        repeatBtn.classList.toggle('active', repeatMode > 0);
        repeatBtn.innerHTML = repeatMode === 2 ? '<span style="font-size:10px; position:absolute; top:-12px; right:-8px; font-weight:bold;">❶</span>' : '';
    };

    document.getElementById('next-btn').onclick = () => {
        let next = isShuffle ? Math.floor(Math.random() * data.tracks.length) : (currentIdx + 1) % data.tracks.length;
        loadTrack(next, true);
    };
    document.getElementById('prev-btn').onclick = () => {
        let prev = (currentIdx - 1 + data.tracks.length) % data.tracks.length;
        loadTrack(prev, true);
    };

    volBar.oninput = () => { audio.volume = volBar.value; muteBtn.className = audio.volume === 0 ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-low'; };
    muteBtn.onclick = () => { audio.muted = !audio.muted; muteBtn.className = audio.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-low'; };

    audio.ontimeupdate = () => {
        if(!isNaN(audio.duration)) {
            seekBar.value = (audio.currentTime / audio.duration) * 100;
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        }
    };
    seekBar.oninput = () => audio.currentTime = (seekBar.value / 100) * audio.duration;
    function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m + ":" + (sec < 10 ? "0" : "") + sec; }

    // リピート不具合の修正：repeatMode を正しく判定
    audio.onended = () => {
        if (repeatMode === 2) { 
            // 1曲リピート
            loadTrack(currentIdx, true); 
        } else if (repeatMode === 1) {
            // 全曲リピート：最後なら最初に戻る
            document.getElementById('next-btn').click();
        } else if (repeatMode === 0) {
            // リピートなし：最後なら止まる、そうでなければ次へ
            if (currentIdx < data.tracks.length - 1) {
                document.getElementById('next-btn').click();
            } else {
                playBtn.className = 'fa-solid fa-play ctrl-icon play-btn-main';
            }
        }
    };
</script>
</body>
</html>
