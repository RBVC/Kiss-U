<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Discography - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤎</text></svg>">
    <link rel="stylesheet" href="style.css?v=final_fresh">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div id="common-header"></div>
    <div class="section">
        <h2 class="section-title fade-in">Discography</h2>
        <div class="detail-flex fade-in">
            <div class="detail-left"><img id="d-jacket" src=""></div>
            <div class="detail-right">
                <div class="player-box">
                    <div class="player-top-controls">
                        <div class="p-meta"><h2 id="p-title">Loading...</h2><p id="p-album"></p></div>
                        <div class="seek-bar-container" style="margin-top:20px;">
                            <div class="time-info"><span id="curr-time">0:00</span><span id="dur-time">0:00</span></div>
                            <input type="range" id="seek-bar" value="0">
                        </div>
                        <div class="player-controls-grid">
                            <div class="grid-left"><i class="fa-solid fa-volume-low" id="mute-btn"></i><input type="range" id="volume-bar" min="0" max="1" step="0.05" value="0.7"></div>
                            <div class="grid-center"><i class="fa-solid fa-backward-step ctrl-icon" id="prev-btn"></i><i class="fa-solid fa-play ctrl-icon play-btn-main" id="play-btn"></i><i class="fa-solid fa-forward-step ctrl-icon" id="next-btn"></i></div>
                            <div class="grid-right"><i class="fa-solid fa-shuffle ctrl-icon" id="shuffle-btn"></i><div style="position:relative; display:inline-block;"><i class="fa-solid fa-repeat ctrl-icon" id="repeat-btn"></i><span id="repeat-indicator"></span></div></div>
                        </div>
                    </div>
                    <div class="player-track-list" id="track-container"></div>
                </div>
            </div>
        </div>
        <div class="grid-nav nav-4col quick-nav fade-in" id="disco-quick-nav" style="margin-top: 80px; padding-top: 40px; border-top: 1px solid #3a2a2a;"></div>
    </div>
    <div id="common-footer"></div>
    <script src="data.js"></script><script src="common.js"></script>
    <script>
        const discoId=new URLSearchParams(window.location.search).get('id')||'fly-by'; const data=discoData[discoId]; const audio=new Audio();
        const playBtn=document.getElementById('play-btn'); const seekBar=document.getElementById('seek-bar'); const repeatIndicator=document.getElementById('repeat-indicator');
        let currentIdx=0; let isShuffle=false; let repeatMode=0;
        if(data){document.getElementById('p-album').innerText=data.title;document.getElementById('d-jacket').src=data.jacket;const container=document.getElementById('track-container');data.tracks.forEach((t,i)=>{const row=document.createElement('div');row.className='track-row';row.id=`t-${i}`;row.innerHTML=`<span>${t.num}. ${t.name}</span>`;row.onclick=()=>loadTrack(i,true);container.appendChild(row);});loadTrack(0,false);}
        const nav=document.getElementById('disco-quick-nav');Object.keys(discoData).forEach(key=>{const item=discoData[key];const a=document.createElement('a');a.href=`discography.html?id=${key}`;a.className='grid-item';a.innerHTML=`<div class="photo-box square"><img src="${item.jacket}"></div>`;nav.appendChild(a);});
        function loadTrack(i,play){currentIdx=i;audio.src=data.tracks[i].file;document.getElementById('p-title').innerText=data.tracks[i].name;document.querySelectorAll('.track-row').forEach(el=>el.classList.remove('active'));document.getElementById(`t-${i}`).classList.add('active');if(play){audio.play();playBtn.className='fa-solid fa-pause ctrl-icon play-btn-main';}}
        playBtn.onclick=()=>{if(audio.paused){audio.play();playBtn.className='fa-solid fa-pause ctrl-icon play-btn-main';}else{audio.pause();playBtn.className='fa-solid fa-play ctrl-icon play-btn-main';}};
        document.getElementById('shuffle-btn').onclick=(e)=>{isShuffle=!isShuffle;e.target.classList.toggle('active',isShuffle);};
        document.getElementById('repeat-btn').onclick=(e)=>{repeatMode=(repeatMode+1)%3;e.target.classList.toggle('active',repeatMode>0);repeatIndicator.innerText=repeatMode===2?'❶': '';};
        document.getElementById('next-btn').onclick=()=>{let n=isShuffle?Math.floor(Math.random()*data.tracks.length):(currentIdx+1)%data.tracks.length;loadTrack(n,true);};
        document.getElementById('prev-btn').onclick=()=>{let p=(currentIdx-1+data.tracks.length)%data.tracks.length;loadTrack(p,true);};
        audio.ontimeupdate=()=>{if(!isNaN(audio.duration)){seekBar.value=(audio.currentTime/audio.duration)*100;document.getElementById('curr-time').innerText=formatTime(audio.currentTime);document.getElementById('dur-time').innerText=formatTime(audio.duration);}};
        seekBar.oninput=()=>audio.currentTime=(seekBar.value/100)*audio.duration;
        function formatTime(s){const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec;}
        audio.onended=()=>{if(repeatMode===2)loadTrack(currentIdx,true);else if(repeatMode===1)document.getElementById('next-btn').click();else if(currentIdx<data.tracks.length-1)document.getElementById('next-btn').click();else playBtn.className='fa-solid fa-play ctrl-icon play-btn-main';};
    </script>
</body>
</html>
