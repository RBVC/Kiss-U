<div class="section" style="margin-top: 70px;">
    <h2 class="section-title">Discography</h2>
    
    <div class="player-wrapper">
        <!-- 上部：操作パネル -->
        <div class="player-top">
            <div class="player-info-row">
                <div class="player-jacket-small"><img id="p-jacket" src=""></div>
                <div class="player-text-meta">
                    <h2 id="p-title">Song Title</h2>
                    <p id="p-album">Album Name</p>
                </div>
            </div>

            <div class="seek-container">
                <div class="time-labels">
                    <span id="curr-time">0:00</span>
                    <span id="dur-time">0:00</span>
                </div>
                <input type="range" id="seek-bar" value="0">
            </div>

            <div class="player-btns">
                <div class="p-btn" id="prev-btn">⏮</div>
                <div class="p-btn play-main" id="play-btn">▶</div>
                <div class="p-btn" id="next-btn">⏭</div>
            </div>
        </div>

        <!-- 下部：トラックリスト -->
        <div class="player-list" id="track-list">
            <!-- JSで生成 -->
        </div>
    </div>

    <!-- 隠しオーディオ要素 -->
    <audio id="audio-engine"></audio>
</div>

<footer><div class="copyright">Copyright &copy; Kiss-U JAPAN. All Rights Reserved.</div></footer>

<script src="data.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const data = discoData[params.get('id') || 'fly-by'];
    const audio = document.getElementById('audio-engine');
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    let currentTrackIdx = 0;

    if (data) {
        document.getElementById('p-album').innerText = data.title;
        document.getElementById('p-jacket').src = data.jacket;

        // リスト生成
        const listContainer = document.getElementById('track-list');
        data.tracks.forEach((track, i) => {
            const div = document.createElement('div');
            div.className = 'track-item';
            div.id = `item-${i}`;
            div.innerHTML = `
                <div class="track-img"><img src="${data.jacket}"></div>
                <div class="track-name-small">${track.name}</div>
                <div class="track-icon-right">≡</div>
            `;
            div.onclick = () => loadTrack(i, true);
            listContainer.appendChild(div);
        });

        loadTrack(0, false);
    }

    function loadTrack(idx, shouldPlay) {
        const track = data.tracks[idx];
        currentTrackIdx = idx;
        audio.src = track.file;
        document.getElementById('p-title').innerText = track.name;
        
        // アクティブ表示の切り替え
        document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`item-${idx}`).classList.add('active');

        if (shouldPlay) {
            audio.play();
            playBtn.innerText = 'II';
        }
    }

    playBtn.onclick = () => {
        if (audio.paused) {
            audio.play();
            playBtn.innerText = 'II';
        } else {
            audio.pause();
            playBtn.innerText = '▶';
        }
    };

    document.getElementById('next-btn').onclick = () => {
        let next = (currentTrackIdx + 1) % data.tracks.length;
        loadTrack(next, true);
    };

    document.getElementById('prev-btn').onclick = () => {
        let prev = (currentTrackIdx - 1 + data.tracks.length) % data.tracks.length;
        loadTrack(prev, true);
    };

    // シークバー連動
    audio.ontimeupdate = () => {
        if (!isNaN(audio.duration)) {
            const pct = (audio.currentTime / audio.duration) * 100;
            seekBar.value = pct;
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-time').innerText = formatTime(audio.duration);
        }
    };

    seekBar.oninput = () => {
        const time = (seekBar.value / 100) * audio.duration;
        audio.currentTime = time;
    };

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ":" + (sec < 10 ? "0" : "") + sec;
    }
    
    // 曲が終わったら次へ
    audio.onended = () => document.getElementById('next-btn').click();
</script>
</body>
</html>
