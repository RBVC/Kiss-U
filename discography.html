<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Discography - Kiss-U</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
    <!-- アイコン素材 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=8.0">
</head>
<body>
<header>
    <a href="index.html" class="logo">Kiss-U</a>
    <nav><ul class="nav-links">
        <li><a href="index.html#news">News</a></li>
        <li><a href="index.html#profile">Profile</a></li>
        <li><a href="index.html#discography">Discography</a></li>
    </ul></nav>
</header>

<div class="section">
    <h2 class="section-title">Discography</h2>
    
    <div class="detail-flex">
        <div class="detail-left"><img id="d-jacket" src=""></div>
        <div class="detail-right">
            <div class="player-box">
                <div class="player-top-controls">
                    <div class="p-meta">
                        <h2 id="p-title">Select Track</h2>
                        <p id="p-album">Album Name</p>
                    </div>
                    <div class="seek-bar-container">
                        <div class="time-info"><span id="curr-time">0:00</span><span id="dur-time">0:00</span></div>
                        <input type="range" id="seek-bar" value="0">
                    </div>
                    <!-- 操作ボタン列 -->
                    <div class="player-btns-row">
                        <i class="fa-solid fa-shuffle ctrl-icon" id="shuffle-btn" title="Shuffle"></i>
                        <i class="fa-solid fa-backward-step ctrl-icon" id="prev-btn"></i>
                        <i class="fa-solid fa-play ctrl-icon play-btn-main" id="play-btn"></i>
                        <i class="fa-solid fa-forward-step ctrl-icon" id="next-btn"></i>
                        <i class="fa-solid fa-repeat ctrl-icon" id="repeat-btn" title="Repeat"></i>
                    </div>
                    <!-- 音量調節 -->
                    <div class="volume-row">
                        <i class="fa-solid fa-volume-low" id="mute-btn" style="cursor:pointer;"></i>
                        <input type="range" id="volume-bar" min="0" max="1" step="0.1" value="0.7">
                    </div>
                </div>
                <div class="player-track-list" id="track-container"></div>
            </div>
        </div>
    </div>
</div>

<footer><div class="copyright">Copyright &copy; Kiss-U JAPAN. All Rights Reserved.</div></footer>

<script src="data.js"></script>
<script>
    const data = discoData[new URLSearchParams(window.location.search).get('id') || 'fly-by'];
    const audio = new Audio();
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    const shuffleBtn = document.getElementById('shuffle-btn');
    const repeatBtn = document.getElementById('repeat-btn');
    const volBar = document.getElementById('volume-bar');
    const muteBtn = document.getElementById('mute-btn');

    let currentIdx = 0;
    let isShuffle = false;
    let repeatMode = 0; // 0: None, 1: All, 2: One

    if (data) {
        document.getElementById('p-album').innerText = data.title;
        document.getElementById('d-jacket').src = data.jacket;
        const container = document.getElementById('track-container');
        data.tracks.forEach((t, i) => {
            const row = document.createElement('div');
            row.className = 'track-row';
            row.id = `t-${i}`;
            row.innerHTML = `<span>${t.num}. ${t.name}</span><i class="fa-solid fa-bars" style="opacity:0.2; font-size:0.7rem;"></i>`;
            row.onclick = () => loadTrack(i, true);
            container.appendChild(row);
        });
        loadTrack(0, false);
    }

    function loadTrack(i, play) {
        currentIdx = i;
        const t = data.tracks[i];
        audio.src = t.file;
        document.getElementById('p-title').innerText = t.name;
        document.querySelectorAll('.track-row').forEach(el => el.classList.remove('active'));
        document.getElementById(`t-${i}`).classList.add('active');
        if (play) { audio.play(); playBtn.className = 'fa-solid fa-pause ctrl-icon play-btn-main'; }
    }

    playBtn.onclick = () => {
        if (audio.paused) { audio.play(); playBtn.className = 'fa-solid fa-pause ctrl-icon play-btn-main'; }
        else { audio.pause(); playBtn.className = 'fa-solid fa-play ctrl-icon play-btn-main'; }
    };

    // シャッフル切り替え
    shuffleBtn.onclick = () => {
        isShuffle = !isShuffle;
        shuffleBtn.classList.toggle('active', isShuffle);
    };

    // リピート切り替え (None -> All -> One)
    repeatBtn.onclick = () => {
        repeatMode = (repeatMode + 1) % 3;
        if (repeatMode === 0) { repeatBtn.className = 'fa-solid fa-repeat ctrl-icon'; repeatBtn.innerHTML = ''; repeatBtn.classList.remove('active'); }
        else if (repeatMode === 1) { repeatBtn.classList.add('active'); repeatBtn.innerHTML = ''; }
        else if (repeatMode === 2) { repeatBtn.innerHTML = '<span style="font-size:10px; position:absolute; margin-top:12px; margin-left:-8px;">1</span>'; }
    };

    document.getElementById('next-btn').onclick = () => {
        let next;
        if (isShuffle) { next = Math.floor(Math.random() * data.tracks.length); }
        else { next = (currentIdx + 1) % data.tracks.length; }
        loadTrack(next, true);
    };

    document.getElementById('prev-btn').onclick = () => {
        let prev = (currentIdx - 1 + data.tracks.length) % data.tracks.length;
        loadTrack(prev, true);
    };

    // 音量・ミュート
    volBar.oninput = () => { audio.volume = volBar.value; audio.muted = false; muteBtn.className = audio.volume === 0 ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-low'; };
    muteBtn.onclick = () => { audio.muted = !audio.muted; muteBtn.className = audio.muted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-low'; };

    // シークバー
    audio.ontimeupdate = () => { if(!isNaN(audio.duration)) { seekBar.value = (audio.currentTime / audio.duration) * 100; document.getElementById('curr-time').innerText = formatTime(audio.currentTime); document.getElementById('dur-time').innerText = formatTime(audio.duration); } };
    seekBar.oninput = () => audio.currentTime = (seekBar.value / 100) * audio.duration;
    function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return m + ":" + (sec < 10 ? "0" : "") + sec; }

    // 曲終了時の処理
    audio.onended = () => {
        if (repeatMode === 2) { loadTrack(currentIdx, true); } // 1曲リピート
        else if (repeatMode === 1 || currentIdx < data.tracks.length - 1) { document.getElementById('next-btn').click(); } // 全曲リピート または 次の曲へ
    };
</script>
</body>
</html>
